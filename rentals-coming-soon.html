<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SALINA FLEET | Launching Soon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #141414;
            --text-light: #fff;
            --accent-gold: #C2A158;
        }
        body { 
            background: var(--bg-dark); 
            color: var(--text-light); 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            text-align: center;
        }

        /* --- LOGO DESIGN: SALINA FLEET --- */
        .brand-container {
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(194, 161, 88, 0.15); /* Λάμψη */
            margin-bottom: 50px;
            animation: fadeIn 1.5s ease-out;
        }
        .logo-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5rem; /* Desktop size */
            font-weight: 700;
            color: var(--text-light);
            line-height: 1;
            margin: 0;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        .logo-tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: var(--accent-gold);
            display: block;
            margin-top: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        
        /* --- COMMING SOON TEXT --- */
        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
        }
        p {
            color: #888;
            max-width: 600px;
            margin: 0 auto 50px auto;
            font-size: 1.1rem;
        }

        /* Loading Spinner */
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--accent-gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 30px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- CTA --- */
        .cta-btn {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--accent-gold);
            padding: 15px 40px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: 0.3s;
        }
        .cta-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-dark);
        }


        /* =========================================
           MOBILE RESPONSIVENESS FIXES
           ========================================= */
        @media (max-width: 768px) {
            
            body { height: 100dvh; } /* Fixes iOS address bar shrinking issue */
            
            .brand-container {
                padding: 20px;
                margin-top: -50px; /* Ανεβάζουμε λίγο ψηλότερα */
            }
            
            /* Μείωση μεγέθους LOGO για κινητό */
            .logo-title { 
                font-size: 3rem !important; /* Μικραίνει από 5rem */
                letter-spacing: 4px;
            }
            .logo-tagline { 
                font-size: 0.7rem; 
                letter-spacing: 4px;
            }

            h2 { font-size: 1.8rem; }
            p { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <div class="logo-title">SALINA</div>
        <span class="logo-tagline">LUXURY FLEET</span>
    </div>
    
    <h2>LAUNCHING SOON</h2>
    
    <div class="spinner"></div>

    <p>
        The exclusive collection of high-performance vehicles for your stay is being curated. 
        We are finalizing partnerships to guarantee VIP pickup/drop-off directly at your villa.
    </p>

    <a href="index.html" class="cta-btn">RETURN TO LITHOS</a>
</body>
</html>
