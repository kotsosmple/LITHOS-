[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    cache-control = '''
    max-age=0,
    no-cache,
    no-store,
    must-revalidate'''

[[headers]]
  for = "/assets/*" # Εδώ πάνε οι εικόνες και τα fonts σου
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"